<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crate Check Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans">
    <div id="app" class="max-w-md mx-auto p-6 pb-24">
        <header class="mb-8 flex justify-between items-start">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-orange-500 uppercase">Crate Check</h1>
                <p class="text-zinc-500 text-xs font-bold mt-1 uppercase tracking-widest leading-tight">
                    Don't buy Dr. John twice.
                </p>
            </div>
            <button @click="showModal = true" class="bg-orange-500 text-black w-12 h-12 rounded-full text-3xl font-bold shadow-lg shadow-orange-500/20">+</button>
        </header>

        <div class="relative mb-8">
            <input v-model="search" type="text" placeholder="Search Artist or Album..." 
                class="w-full p-5 bg-zinc-900 border-2 border-zinc-800 rounded-2xl focus:outline-none focus:border-orange-500 text-lg transition-all">
            <div v-if="search" @click="search = ''" class="absolute right-4 top-5 text-zinc-500">✕</div>
        </div>

        <div v-if="search.length > 0">
            <div v-if="filteredRecords.length > 0" class="space-y-3">
                <p class="text-zinc-600 text-xs uppercase font-black tracking-widest mb-2">Matches in your collection:</p>
                <div v-for="r in filteredRecords" :key="r.album" class="p-4 bg-zinc-900 rounded-2xl border border-zinc-800 flex justify-between items-center animate-in fade-in duration-300">
                    <div>
                        <h3 class="font-bold text-lg leading-tight">{{ r.album }}</h3>
                        <p class="text-zinc-500 text-sm italic">{{ r.artist }}</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <span v-if="r.tt === 'TRUE' || r.tt === true" class="text-orange-500 text-xl">★</span>
                        <span :class="r.owned === 'TRUE' || r.owned === true ? 'bg-green-900/30 text-green-400 border-green-800' : 'bg-zinc-800 text-zinc-500 border-zinc-700'" 
                            class="text-[10px] font-black border px-2 py-0.5 rounded uppercase">
                            {{ r.owned === 'TRUE' || r.owned === true ? 'OWNED' : 'WANT' }}
                        </span>
                    </div>
                </div>
            </div>
            <div v-else class="text-center py-10">
                <p class="text-zinc-500">No matches found.</p>
                <p class="text-orange-500 font-bold text-sm mt-2">Safe to buy? (Or add it now!)</p>
            </div>
        </div>

        <div v-else class="text-center py-20 opacity-20">
            <svg class="w-16 h-16 mx-auto mb-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
            <p class="font-bold tracking-widest uppercase text-sm">Waiting for input...</p>
        </div>

        <div v-if="showModal" class="fixed inset-0 bg-black/95 flex items-center justify-center p-6 z-50 backdrop-blur-sm">
            <div class="bg-zinc-900 border border-zinc-800 p-8 rounded-3xl w-full max-w-sm shadow-2xl">
                <h2 class="text-2xl font-black mb-6 text-orange-500 uppercase tracking-tight">Add New Vinyl</h2>
                <div class="space-y-4">
                    <input v-model="newRecord.artist" placeholder="Artist Name" class="w-full p-4 bg-zinc-800 rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                    <input v-model="newRecord.album" placeholder="Album Title" class="w-full p-4 bg-zinc-800 rounded-xl outline-none focus:ring-2 focus:ring-orange-500">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button @click="newRecord.owned = !newRecord.owned" :class="newRecord.owned ? 'bg-green-600 text-white' : 'bg-zinc-800 text-zinc-500'" class="py-3 rounded-xl font-bold text-xs uppercase transition">Owned</button>
                        <button @click="newRecord.tt = !newRecord.tt" :class="newRecord.tt ? 'bg-orange-500 text-black' : 'bg-zinc-800 text-zinc-500'" class="py-3 rounded-xl font-bold text-xs uppercase transition text-center">T & T ★</button>
                    </div>

                    <div class="flex gap-3 pt-6">
                        <button @click="showModal = false" class="flex-1 py-3 text-zinc-500 font-bold uppercase text-xs">Cancel</button>
                        <button @click="saveRecord" class="flex-1 py-4 bg-orange-500 text-black font-black rounded-xl uppercase tracking-tighter shadow-lg shadow-orange-500/20">Save to Crate</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://sheetdb.io/api/v1/lw3wo9zwi5xfd'; 

        const { createApp } = Vue
        createApp({
            data() {
                return {
                    loading: true,
                    showModal: false,
                    search: '',
                    records: [],
                    newRecord: { artist: '', album: '', owned: false, tt: false }
                }
            },
            computed: {
                filteredRecords() {
                    const s = this.search.toLowerCase();
                    return this.records.filter(r => {
                        // Simple "Includes" search - very forgiving for partial words
                        return r.artist.toLowerCase().includes(s) || r.album.toLowerCase().includes(s);
                    });
                }
            },
            methods: {
                async fetchData() {
                    try {
                        const res = await fetch(API_URL);
                        this.records = await res.json();
                    } catch(e) { console.error("Check
